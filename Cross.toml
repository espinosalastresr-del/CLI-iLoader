# Cross.toml — configuración para cross-rs (fix dbus + musl)

[build.env]
passthrough = [
    "CARGO_TERM_COLOR",
    "RUST_LOG",
]

[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:edge"

# 🔧 FIX: instalar pkg-config + dbus dentro del container
pre-build = [
    "apk add --no-cache pkgconf dbus-dev"
]

[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:edge"

pre-build = [
    "apk add --no-cache pkgconf dbus-dev"
]
