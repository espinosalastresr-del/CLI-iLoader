# Cross.toml — configuración para compilación cruzada con cross-rs
# Compila para Alpine Linux (musl libc) desde cualquier runner

[build.env]
passthrough = [
    "CARGO_TERM_COLOR",
    "RUST_LOG",
]

# Imagen base para el target musl — incluye las dependencias C necesarias
[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:edge"

# Si necesitas compilar en ARM (Raspberry Pi, etc.)
[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:edge"
