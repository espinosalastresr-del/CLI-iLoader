name: Build (Alpine/musl)

on:
  push:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-musl-

      - name: Instalar Rust + target musl
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Instalar cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Compilar para musl
        run: cross build --release --target x86_64-unknown-linux-musl

      - name: Preparar binario
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/iloader dist/iloader-linux-x86_64
          chmod +x dist/iloader-linux-x86_64

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: iloader-linux-x86_64
          path: dist/iloader-linux-x86_64
          retention-days: 14
