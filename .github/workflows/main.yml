name: Build CLI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Debug Git
        run: |
          git --version
          git ls-remote https://github.com/espinosalastres-del/isideload.git

      - name: Cargo Metadata
        run: cargo metadata --format-version=1

      - name: Build
        run: |
          cross build 
            --release 
            --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iloader-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/iloader
