name: Build Rust (Alpine musl)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build cross image
        run: docker build -t cross-custom:latest -f .cross/Dockerfile .
        
      - name: Inspect idevice
        run: |
         find ~/.cargo -name mod.rs | grep remote_pairing
         grep -n "pub struct RemotePairingClient" -A50 -B10 ~/.cargo/registry/src/*/idevice-0.1.61/src/remote_pairing/mod.rs || true
         grep -n "pub async fn connect" -A50 -B10 ~/.cargo/registry/src/*/idevice-0.1.61/src/remote_pairing/mod.rs || true
      


      - name: Build project
        run: cross build --release --target x86_64-unknown-linux-musl
