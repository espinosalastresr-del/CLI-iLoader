name: Build Rust (Alpine musl)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build cross image
        run: docker build -t cross-custom:latest -f .cross/Dockerfile .
        
      - name: Inspect idevice
        run: |
         find ~/.cargo -path "*idevice-0.1.61*" | sort
         grep -R "RemotePairingClient" ~/.cargo/registry/src/*/idevice-0.1.61/src || true

         grep -R "CoreDeviceProxy" ~/.cargo/registry/src/*/idevice-0.1.61/src || true

         grep -R "HouseArrestClient" ~/.cargo/registry/src/*/idevice-0.1.61/src || true

      - name: Build project
        run: cross build --release --target x86_64-unknown-linux-musl
